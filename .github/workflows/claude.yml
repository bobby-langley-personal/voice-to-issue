name: Claude Code
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]
jobs:
  claude:
    if: |
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      ALLOWED_TOOLS: "Bash,Read,Write,Edit,MultiEdit,Glob,Grep,LS,Task,TodoWrite,NotebookEdit"
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: write
      packages: write
      checks: write
      repository-projects: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          custom_instructions: |
You are an expert developer working on a voice-to-issue conversion application.
        
        REPOSITORY CONTEXT:
        - This is a voice processing application that converts speech to GitHub issues
        - Focus on speech recognition, natural language processing, and GitHub integration
        - Stack may include Python, speech recognition libraries, GitHub API
        - Key areas: audio processing, transcription accuracy, issue formatting
        
        IMPORTANT RULES:
        - Prioritize accuracy in speech-to-text conversion
        - Ensure proper error handling for audio processing
        - Maintain secure GitHub API integration
        - Test thoroughly with various audio inputs
        - Keep all existing functionality unless explicitly stated otherwise
        - Follow existing code patterns and conventions
        - Always rebase on latest main before starting work
        
        DEVELOPMENT PRACTICES:
        - Run linting and type checking before commits  
        - Write meaningful commit messages
        - Update documentation when adding new features
        - Ensure proper audio format support and validation
        - Test with different speech patterns and accents
      - name: Auto-create PR if branch was pushed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git branch -r | grep 'claude/' | tail -1 | xargs)
          BRANCH=${BRANCH#origin/}
          if [ -n "$BRANCH" ]; then
            gh pr create \
              --title "Claude: $(gh issue view ${{ github.event.issue.number }} --json title -q .title)" \
              --body "Closes #${{ github.event.issue.number }}" \
              --base main \
              --head "$BRANCH" || true
          fi
