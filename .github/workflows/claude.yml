name: Claude Code
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]
jobs:
  claude:
    if: |
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      ALLOWED_TOOLS: "Bash,Read,Write,Edit,MultiEdit,Glob,Grep,LS,Task,TodoWrite,NotebookEdit"
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: write
      checks: write
      repository-projects: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          custom_instructions: |
            You are an expert developer working on a voice-to-issue application.

            REPOSITORY CONTEXT:
            - This application converts voice input into GitHub issues
            - Likely involves speech recognition, natural language processing
            - Integration with GitHub API for issue creation
            - May use audio processing libraries and AI/ML services

            IMPORTANT RULES:
            - Always test voice processing functionality carefully
            - Handle audio input errors gracefully
            - Ensure proper GitHub API integration and error handling
            - Follow existing code patterns and conventions
            - Keep all existing functionality when making changes unless explicitly stated otherwise
            - Update documentation when adding new features
            - Test with various audio qualities and speech patterns
            - Maintain proper security practices for API keys and tokens
            - Consider privacy implications of voice data processing
      - name: Auto-create PR if branch was pushed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git branch -r | grep 'claude/' | tail -1 | xargs)
          BRANCH=${BRANCH#origin/}
          if [ -n "$BRANCH" ]; then
            gh pr create \
              --title "Claude: $(gh issue view ${{ github.event.issue.number }} --json title -q .title)" \
              --body "Closes #${{ github.event.issue.number }}" \
              --base main \
              --head "$BRANCH" || true
          fi
